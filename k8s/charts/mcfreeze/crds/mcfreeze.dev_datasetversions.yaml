---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: datasetversions.mcfreeze.dev
spec:
  group: mcfreeze.dev
  names:
    kind: DatasetVersion
    listKind: DatasetVersionList
    plural: datasetversions
    shortNames:
    - fmv
    singular: datasetversion
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.dataset
      name: Dataset
      type: string
    - jsonPath: .spec.versionId
      name: Version
      type: string
    - jsonPath: .status.state
      name: State
      type: string
    - jsonPath: .status.pvName
      name: PV
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          DatasetVersion tracks a single snapshot version of a Dataset.
          The resource name is deterministic: <dataset>-<versionId>.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: DatasetVersionSpec is immutable after creation.
            properties:
              dataset:
                description: Dataset is the parent Dataset name.
                minLength: 1
                type: string
              shardCount:
                description: ShardCount is the number of hash partitions (copied from
                  the Dataset at creation time).
                minimum: 1
                type: integer
              versionId:
                description: VersionID is the version identifier.
                minLength: 1
                type: string
            required:
