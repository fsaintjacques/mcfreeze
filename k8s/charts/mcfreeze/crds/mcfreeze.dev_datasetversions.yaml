            - shardCount
            - versionId
            type: object
            x-kubernetes-validations:
            - message: DatasetVersion spec is immutable
              rule: self == oldSelf
          status:
            description: DatasetVersionStatus defines the observed state of a DatasetVersion.
            properties:
              buildJob:
                description: BuildJob is the builder handle (Kubernetes Job name).
                type: string
              conditions:
                description: Conditions represent the latest observations of the DatasetVersion's
                  state.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              diskUrl:
                description: DiskURL is the cloud disk resource URL (set by the build
                  job on completion).
                type: string
              error:
                description: Error contains the failure reason when State is "failed".
                type: string
              meta:
                description: |-
                  Meta is the verbatim contents of the snapshot's meta.json, stored so
                  downstream consumers (scheduler, node-agent, KV server) can derive
                  fields like IndexBytes, protobuf Descriptor, per-partition sizes, etc.
                  without the CRD growing a new field per derived value.
                x-kubernetes-preserve-unknown-fields: true
              pvName:
                description: PVName is the Kubernetes PersistentVolume name (set on
                  transition to ready).
                type: string
              rollout:
                description: Rollout reports per-node convergence for this version
                  while it is active.
                properties:
                  convergedNodes:
                    description: ConvergedNodes is the count of nodes reporting Active
                      state for this version.
                    type: integer
                  errorNodes:
                    description: ErrorNodes is the count of nodes reporting Error
                      for this version.
                    type: integer
                  pendingNodes:
                    description: PendingNodes is the count of nodes that have not
                      yet reached Active.
                    type: integer
                  totalNodes:
                    description: TotalNodes is the count of nodes the version has
                      been pushed to.
                    type: integer
                required:
                - convergedNodes
                - errorNodes
                - pendingNodes
                - totalNodes
                type: object
              snapshotPath:
                description: SnapshotPath is the on-disk location of the snapshot
