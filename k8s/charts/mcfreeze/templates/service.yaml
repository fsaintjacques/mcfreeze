apiVersion: v1
kind: Service
metadata:
  name: {{ include "mcfreeze.controlPlane.name" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "mcfreeze.labels" . | nindent 4 }}
    app.kubernetes.io/component: control-plane
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "mcfreeze.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: control-plane
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
