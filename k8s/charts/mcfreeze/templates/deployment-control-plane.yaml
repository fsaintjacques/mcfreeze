{{- include "mcfreeze.checkLeaderElection" . -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mcfreeze.controlPlane.name" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "mcfreeze.labels" . | nindent 4 }}
    app.kubernetes.io/component: control-plane
spec:
  replicas: {{ .Values.controlPlane.replicas }}
  selector:
    matchLabels:
      {{- include "mcfreeze.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: control-plane
  template:
    metadata:
      labels:
        {{- include "mcfreeze.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: control-plane
    spec:
      serviceAccountName: {{ include "mcfreeze.controlPlane.name" . }}
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: control-plane
          image: {{ include "mcfreeze.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - control-plane
            - --listen={{ .Values.controlPlane.listen }}
            - --image={{ include "mcfreeze.builderImage" . }}
            - --image-pull-policy={{ .Values.image.pullPolicy }}
            - --storage-class={{ include "mcfreeze.requireStorageClass" . }}
            - --disk-size-gb={{ .Values.controlPlane.diskSizeGB }}
            - --leader-elect={{ .Values.controlPlane.leaderElection }}
            - --metrics-bind-address={{ .Values.controlPlane.metricsBindAddress }}
            - --health-probe-bind-address={{ .Values.controlPlane.healthProbeBindAddress }}
            - --builder-pod-template={{ include "mcfreeze.builderPodTemplate" . }}
          env:
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          ports:
            - name: http
              containerPort: {{ splitList ":" .Values.controlPlane.listen | last | atoi }}
            - name: metrics
              containerPort: {{ splitList ":" .Values.controlPlane.metricsBindAddress | last | atoi }}
            - name: health
              containerPort: {{ splitList ":" .Values.controlPlane.healthProbeBindAddress | last | atoi }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 5
          {{- with .Values.controlPlane.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.controlPlane.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.controlPlane.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.controlPlane.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
