---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: datasets.frostmap.dev
spec:
  group: frostmap.dev
  names:
    kind: Dataset
    listKind: DatasetList
    plural: datasets
    shortNames:
    - fmd
    singular: dataset
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.keyPrefix
      name: KeyPrefix
      type: string
    - jsonPath: .spec.shardCount
      name: Shards
      type: integer
    - jsonPath: .status.activeVersion
      name: Active
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          Dataset describes an immutable KV dataset and its build configuration.
          The resource name (metadata.name) is the dataset name.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: DatasetSpec defines the desired state of a Dataset.
            properties:
              keyPrefix:
                description: |-
                  KeyPrefix is the routing prefix the KV server uses for this dataset.
                  Must be unique across all datasets on a node.
                minLength: 1
                type: string
              retention:
                default: 2
                description: Retention is the number of ready versions to keep before
                  cleanup.
                minimum: 1
                type: integer
              shardCount:
                description: ShardCount is the number of hash partitions. Must be
                  a power of 2.
                minimum: 1
                type: integer
              source:
                description: Source describes how to produce key-value pairs from
                  a tabular source.
                properties:
                  bigquery:
                    description: BigQuery source configuration.
                    properties:
                      project:
                        type: string
                      rowRestriction:
                        type: string
                      selectedFields:
                        items:
                          type: string
                        type: array
                      table:
                        type: string
                    required:
                    - project
                    - table
                    type: object
                  csv:
                    description: CSV source configuration.
                    properties:
                      data:
                        description: Data is inline CSV content (including the header
                          row).
                        type: string
                      path:
                        description: Path is a filesystem path to a CSV file.
                        type: string
                    type: object
                  encoding:
                    description: Encoding specifies how to transcode non-key columns
                      into the KV value.
                    properties:
                      protobuf:
                        description: ProtobufEncoding configures Arrow to protobuf
                          transcoding.
                        properties:
                          descriptor:
                            type: string
                          descriptorUri:
                            type: string
                          messageName:
                            type: string
                          package:
                            type: string
                        required:
                        - messageName
                        type: object
                    type: object
                  keyColumn:
                    description: KeyColumn is the Arrow column name whose bytes become
                      the KV key.
                    type: string
                  valueColumn:
                    description: |-
                      ValueColumn is the Arrow column name whose bytes become the KV value (raw mode).
                      Required when Encoding is nil; must be empty when Encoding is set.
                    type: string
                required:
                - keyColumn
                type: object
              trigger:
                description: |-
                  Trigger describes how new DatasetVersions are produced. If unset,
                  versions are only created by external triggers (HTTP build endpoint,
                  future webhooks, manual kubectl apply).
                properties:
                  cron:
                    description: Cron schedules periodic builds.
                    properties:
                      schedule:
                        description: Schedule is a standard cron expression (5-field,
                          no seconds).
                        minLength: 1
                        type: string
                    required:
                    - schedule
                    type: object
                  manual:
                    description: Manual marks the dataset as build-on-demand only.
                    type: object
                type: object
            required:
            - keyPrefix
            - retention
            - shardCount
            - source
            type: object
          status:
            description: DatasetStatus defines the observed state of a Dataset.
            properties:
              activeVersion:
                description: ActiveVersion is the version ID currently being served.
                type: string
              conditions:
                description: Conditions represent the latest observations of the Dataset's
                  state.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
