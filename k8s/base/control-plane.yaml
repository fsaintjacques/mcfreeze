apiVersion: apps/v1
kind: Deployment
metadata:
  name: frostmap-control-plane
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frostmap-control-plane
  template:
    metadata:
      labels:
        app: frostmap-control-plane
    spec:
      serviceAccountName: frostmap-control-plane
      containers:
        - name: control-plane
          image: frostmap:dev
          args:
            - control-plane
            - --listen=:8080
            - --image=frostmap:dev
            - --storage-class=csi-hostpath-sc
            - --disk-size-gb=1
            - --leader-elect=true
            - --metrics-bind-address=:8081
            - --health-probe-bind-address=:8082
          env:
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          ports:
            - name: http
              containerPort: 8080
            - name: metrics
              containerPort: 8081
            - name: health
              containerPort: 8082
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 5
