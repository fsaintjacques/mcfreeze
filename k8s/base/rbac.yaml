# --- Control-plane ServiceAccount + RBAC ---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: frostmap-control-plane
---
# Namespaced resources: Jobs, ConfigMaps, PVCs, Pods (for deleteJobPods).
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: frostmap-control-plane
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "update", "delete", "list"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["create", "get", "delete"]
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["create", "get", "update", "delete", "list"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["list", "delete"]
  - apiGroups: ["frostmap.dev"]
    resources: ["datasets", "datasetversions"]
    verbs: ["create", "get", "update", "delete", "list", "watch", "patch"]
  - apiGroups: ["frostmap.dev"]
    resources: ["datasets/status", "datasetversions/status"]
    verbs: ["get", "update", "patch"]
  # Lease-based leader election for the controller-runtime manager.
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Events are emitted by controller-runtime for leader election transitions
  # and by reconcilers via mgr.GetEventRecorderFor.
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: frostmap-control-plane
subjects:
  - kind: ServiceAccount
    name: frostmap-control-plane
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: frostmap-control-plane
---
# Cluster-scoped: PersistentVolumes (create, get, update, delete, list)
# and VolumeAttachments (list, watch — used by the retirement reconciler
# to gate PV deletion on "no node still has this disk attached").
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: frostmap-control-plane
rules:
  - apiGroups: [""]
    resources: ["persistentvolumes"]
    verbs: ["create", "get", "update", "delete", "list"]
  - apiGroups: ["storage.k8s.io"]
    resources: ["volumeattachments"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: frostmap-control-plane
subjects:
  - kind: ServiceAccount
    name: frostmap-control-plane
    namespace: default
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: frostmap-control-plane
---
# --- Node-agent ServiceAccount + RBAC ---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: frostmap-node-agent
---
# Cluster-scoped: VolumeAttachments.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: frostmap-node-agent
rules:
  - apiGroups: ["storage.k8s.io"]
    resources: ["volumeattachments"]
    verbs: ["create", "get", "delete", "list", "watch"]
  - apiGroups: [""]
    resources: ["persistentvolumes"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: frostmap-node-agent
subjects:
  - kind: ServiceAccount
    name: frostmap-node-agent
    namespace: default
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: frostmap-node-agent
