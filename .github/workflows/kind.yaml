name: KIND

on:
  pull_request:
    paths:
      - 'docker/**'
      - 'kind/**'
      - 'Makefile'
      - '.github/workflows/kind.yaml'
      - 'rust/**'
      - 'go/**'
  push:
    branches: [main]
    paths:
      - 'docker/**'
      - 'kind/**'
      - 'Makefile'
      - '.github/workflows/kind.yaml'
      - 'rust/**'
      - 'go/**'

jobs:
  kind-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install KIND
        uses: helm/kind-action@v1
        with:
          install_only: true

      - name: Create cluster and load images
        run: make kind-up kind-load

      - name: Smoke test - nodes ready
        run: kubectl get nodes -o wide

      - name: Smoke test - storage classes
        run: |
          kubectl get storageclass
          kubectl get storageclass csi-hostpath-sc

      - name: Smoke test - CSI driver
        run: kubectl get csidriver hostpath.csi.k8s.io

      - name: Smoke test - fm image runs
        run: |
          kubectl run smoke --image=frostmap/fm:dev --restart=Never --image-pull-policy=Never -- fm --version
          sleep 5
          kubectl get pod smoke
          kubectl delete pod smoke --ignore-not-found

      - name: Teardown
        if: always()
        run: make kind-down
