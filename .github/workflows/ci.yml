name: CI

on:
  pull_request:
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  KIND_CLUSTER_NAME: frostmap
  FROSTMAP_IMAGE: frostmap:dev

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
          shared-key: ci
      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache-dependency-path: go/go.sum
      - name: Build fm and fmtctl (debug)
        run: make build
      - name: Stage runtime image context
        run: |
          mkdir -p /tmp/stage
          cp rust/target/debug/fm      /tmp/stage/fm
          cp go/bin/fmtctl             /tmp/stage/fmtctl
          cp docker/Dockerfile.runtime /tmp/stage/Dockerfile
      - uses: docker/setup-buildx-action@v3
      - name: Build runtime image
        uses: docker/build-push-action@v6
        with:
          context: /tmp/stage
          tags: ${{ env.FROSTMAP_IMAGE }}
          outputs: type=docker,dest=/tmp/frostmap.tar
      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: frostmap-image
          path: /tmp/frostmap.tar
          retention-days: 1

  check:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
          shared-key: ci
      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache-dependency-path: go/go.sum
      - run: make check

  kind:
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache-dependency-path: go/go.sum
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: frostmap-image
          path: /tmp
      - name: Load image into docker
        run: docker load -i /tmp/frostmap.tar
      - name: Install KIND
        uses: helm/kind-action@v1
        with:
          install_only: true
      - name: Create cluster
        run: make kind-up
      - name: Load image into kind
        run: kind load docker-image ${{ env.FROSTMAP_IMAGE }} --name ${{ env.KIND_CLUSTER_NAME }}
      - name: Install chart and run kind tests
        run: make helm-install-kind test-kind
      - name: Teardown
        if: always()
        run: make kind-down
